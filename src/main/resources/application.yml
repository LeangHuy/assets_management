spring:
  application:
    name: assets_management
  config:
    import:
      - optional:file:.env.properties
      - optional:file:../.env.properties
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3308/assets_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:asd@ASD123}
    driver-class-name: org.mariadb.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000}

license:
  signing:
    public-key: ${LICENSE_SIGNING_PUBLIC_KEY:}
  storage:
    path: ${LICENSE_STORAGE_PATH:data/license/active.lic}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
