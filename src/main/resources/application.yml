spring:
  application:
    name: assets_management
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3308/assetsDb}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:asd@ASD123}
    driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
