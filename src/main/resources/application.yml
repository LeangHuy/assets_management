spring:
  application:
    name: assets_management
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3308/assets_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:asd@ASD123}
    driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
